name: Доклад о весе (Analyze Bundle Comment)

on:
  workflow_run:
    workflows: ['Analyze Bundle']
    types:
      - completed

permissions: {}

# ДОБАВИМ СИЛОВОЙ НАКАЗ, ЧТОБЫ ВСЕ ВЛОЖЕННЫЕ ОРУДИЯ СЛУШАЛИСЬ
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Скачать итоги замера веса
        # Обновляем до v3 для лучшей дружбы с новыми версиями
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: analyze.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: analysis_comment.txt
          path: analysis_comment.txt

      - name: Скачать номер прошения (PR)
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: analyze.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: pr_number
          path: pr_number

      - name: Сложить текст доклада
        id: get-comment-body
        if: success()
        run: |
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo '' >>  $GITHUB_OUTPUT
          echo '## Перемены в весе (Size changes)' >>  $GITHUB_OUTPUT
          echo '' >>  $GITHUB_OUTPUT
          echo '<details>' >>  $GITHUB_OUTPUT
          echo '' >>  $GITHUB_OUTPUT
          cat analysis_comment.txt/__bundle_analysis_comment.txt >> $GITHUB_OUTPUT
          echo '' >>  $GITHUB_OUTPUT
          echo '</details>' >>  $GITHUB_OUTPUT
          echo '' >>  $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          pr_number=$(cat pr_number/pr_number)
          echo "pr-number=$pr_number" >> $GITHUB_OUTPUT

      - name: Оставить весть в прошении
        # Обновляем до v2
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: next-bundle-analysis
          number: ${{ steps.get-comment-body.outputs.pr-number }}
          message: ${{ steps.get-comment-body.outputs.body }}
