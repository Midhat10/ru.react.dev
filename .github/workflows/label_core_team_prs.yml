name: Метка для главных зодчих (Label Core Team PRs)

on:
  pull_request_target:

permissions: {}

# СИЛОВОЙ НАКАЗ ДЛЯ ТИШИНЫ В ЛЕТОПИСИ
env:
  TZ: /usr/share/zoneinfo/America/Los_Angeles
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_maintainer:
    # Обращаемся к общим правилам Фейсбука
    uses: facebook/react/.github/workflows/shared_check_maintainer.yml@main
    permissions:
      contents: read
    with:
      actor: ${{ github.event.pull_request.user.login }}

  label:
    if: ${{ needs.check_maintainer.outputs.is_core_team == 'true' }}
    runs-on: ubuntu-latest
    needs: check_maintainer
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Поставить метку «Дружина Расписывателя»
        # Используем v7 — оно уже дружит с новыми версиями
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
              labels: ['React Core Team']
            });
